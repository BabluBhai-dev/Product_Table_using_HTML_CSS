<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Table</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Product Inventory</h1>
      <table>
        <thead>
          <tr>
            <th>Image</th>
            <th>Product</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Rating</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
              <img src="Image/laptop.jpg" alt="laptop" />
            </td>
            <td>Laptop</td>
            <td rowspan="2">Electronics</td>
            <td>$850</td>
            <td>15</td>
            <td>⭐⭐⭐⭐⭐</td>
            <td>Available</td>
          </tr>
          <tr>
            <td>
              <img src="https://picsum.photos/80?2" />
            </td>

            <td>Keyboard</td>

            <td>$35</td>

            <td>45</td>

            <td>⭐⭐⭐⭐</td>

            <td>Available</td>
          </tr>
           <tr>

            <td>
                <img src="https://picsum.photos/80?3">
            </td>

            <td>T-Shirt</td>

            <td>Clothing</td>

            <td>$20</td>

            <td>120</td>

            <td>⭐⭐⭐⭐⭐</td>

            <td>Available</td>

        </tr>
        <tr>

            <td>
                <img src="https://picsum.photos/80?4">
            </td>

            <td>Headphones</td>

            <td>Accessories</td>

            <td>$80</td>

            <td>8</td>

            <td>⭐⭐⭐⭐</td>

            <td>Low Stock</td>

        </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="7">
                    Total Products : 4
                </td>
            </tr>
        </tfoot>
      </table>
    </div>
  </body>
</html>
