<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Table</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Product Inventory</h1>
      <table border="2">
        <thead>
          <tr>
            <th>Image</th>
            <th>Product</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Rating</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
                <img src="Image/laptop.jpg" alt="laptop">
            </td>
            <td>Laptop</td>
            <td rowspan="2">Electronics</td>
            <td>$850</td>
            <td>15</td>
            <td>⭐⭐⭐⭐⭐</td>
            <td>Available</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
